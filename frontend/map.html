<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WaterWatch – Interactive Issue Map</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3105/3105807.png">
  <link rel="stylesheet" href="css/style.css">
  <!-- Load Auth Session Checker synchronously -->
  <script src="js/auth.js"></script>
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <!-- Leaflet MarkerCluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
</head>
<body style="height: 100vh; display: flex; flex-direction: column;">

  <!-- Dynamic Header Injection based on User Session Role -->
  <header id="globalHeader"></header>

  <!-- Interactive Map Wrapper -->
  <div class="map-wrapper">
    <!-- Sidebar Panel (Filters) -->
    <aside class="map-sidebar">
      <div>
        <h2 class="sidebar-title">Water Issues Map</h2>
        <p style="color: var(--text-muted); font-size: 0.85rem;">View and filter real-time citizen-reported water complaints in your city.</p>
      </div>

      <!-- Live Search Box -->
      <div class="filter-group" style="padding-bottom: 1rem;">
        <h4>Search Complaints</h4>
        <input type="text" id="mapSearch" placeholder="Type keyword..." style="width: 100%; padding: 0.6rem 0.85rem; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 0.85rem; outline: none;">
      </div>

      <!-- Layer Control Switches -->
      <div class="filter-group">
        <h4>Visual Overlays</h4>
        
        <div class="toggle-box">
          <span style="font-size: 0.9rem; font-weight: 600;">Enable Clusters</span>
          <label class="switch">
            <input type="checkbox" id="clusterToggle" checked>
            <span class="slider"></span>
          </label>
        </div>

        <div class="toggle-box">
          <span style="font-size: 0.9rem; font-weight: 600;">Heatmap Overlay</span>
          <label class="switch">
            <input type="checkbox" id="heatmapToggle">
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <!-- Filter by Category -->
      <div class="filter-group">
        <h4>Issue Category</h4>
        <label class="checkbox-label">
          <input type="checkbox" name="typeFilter" value="leakage" checked>
          <span style="display:inline-block; width: 10px; height: 10px; border-radius:50%; background:#0284C7; margin-right: 2px;"></span>
          Leakage
        </label>
        <label class="checkbox-label">
          <input type="checkbox" name="typeFilter" value="contamination" checked>
          <span style="display:inline-block; width: 10px; height: 10px; border-radius:50%; background:#EF4444; margin-right: 2px;"></span>
          Contamination
        </label>
        <label class="checkbox-label">
          <input type="checkbox" name="typeFilter" value="shortage" checked>
          <span style="display:inline-block; width: 10px; height: 10px; border-radius:50%; background:#F59E0B; margin-right: 2px;"></span>
          Supply Shortage
        </label>
        <label class="checkbox-label">
          <input type="checkbox" name="typeFilter" value="pressure" checked>
          <span style="display:inline-block; width: 10px; height: 10px; border-radius:50%; background:#6B7280; margin-right: 2px;"></span>
          Low Pressure
        </label>
        <label class="checkbox-label">
          <input type="checkbox" name="typeFilter" value="other" checked>
          <span style="display:inline-block; width: 10px; height: 10px; border-radius:50%; background:#8B5CF6; margin-right: 2px;"></span>
          Other
        </label>
      </div>

      <!-- Filter by Severity -->
      <div class="filter-group">
        <h4>Severity Level</h4>
        <label class="checkbox-label"><input type="checkbox" name="severityFilter" value="low" checked> Low</label>
        <label class="checkbox-label"><input type="checkbox" name="severityFilter" value="medium" checked> Medium</label>
        <label class="checkbox-label"><input type="checkbox" name="severityFilter" value="high" checked> High</label>
        <label class="checkbox-label"><input type="checkbox" name="severityFilter" value="critical" checked> Critical</label>
      </div>

      <!-- Filter by Status -->
      <div class="filter-group">
        <h4>Ticket Status</h4>
        <label class="checkbox-label"><input type="checkbox" name="statusFilter" value="reported" checked> Reported</label>
        <label class="checkbox-label"><input type="checkbox" name="statusFilter" value="under_review" checked> Under Review</label>
        <label class="checkbox-label"><input type="checkbox" name="statusFilter" value="in_progress" checked> In Progress</label>
        <label class="checkbox-label"><input type="checkbox" name="statusFilter" value="resolved" checked> Resolved</label>
      </div>

      <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border); font-size: 0.75rem; color: var(--text-muted); text-align: center;">
        <p>Double-click anywhere on the empty map to report an issue at that coordinates pin.</p>
      </div>
    </aside>

    <!-- Map container -->
    <div id="mainMap" class="main-map-container"></div>
  </div>

  <!-- Toast Notification Overlay -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Leaflet Core JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <!-- Leaflet MarkerCluster JS -->
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
  <!-- Leaflet Heatmap JS -->
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet.heat.js"></script>
  <!-- Map script logic -->
  <script src="js/map.js"></script>
</body>
</html>
